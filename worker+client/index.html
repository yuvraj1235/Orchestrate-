<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluster Intelligence | Load Balancer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header { margin-bottom: 40px; border-left: 4px solid var(--accent); padding-left: 20px; }
        h1 { margin: 0; font-weight: 600; letter-spacing: -1px; }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; }

        /* Stats Overview */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .stat-card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #334155;
        }
        .stat-val { font-size: 1.5rem; font-weight: 600; color: var(--accent); display: block; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-dim); }

        /* Node Cards */
        .node-card { 
            background: var(--card-bg); 
            padding: 15px 20px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .node-card:hover { border-color: var(--accent); transform: translateX(5px); }
        
        .node-info { flex-grow: 1; }
        .node-ip { font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; }
        
        .load-container { width: 250px; margin-left: 20px; }
        .load-bar { height: 8px; background: #334155; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .load-fill { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Form Styling */
        .upload-section { 
            background: #1e293b80; 
            padding: 30px; 
            border-radius: 12px; 
            border: 2px dashed #334155;
            text-align: center;
            margin-top: 40px;
        }
        input[type="file"] { margin-bottom: 20px; color: var(--text-dim); }
        button { 
            background: var(--accent); 
            color: #0f172a; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        hr { border: 0; border-top: 1px solid #334155; margin: 40px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cluster Control Center</h1>
            <div class="subtitle">Distributed Node Monitoring & Task Deployment</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Active Nodes</span>
                <span id="node-count" class="stat-val">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">System Health</span>
                <span id="avg-load" class="stat-val">--</span>
            </div>
        </div>
        
        <h3>Live Node Status</h3>
        <div id="nodes">Scanning network for heartbeats...</div>

        <hr>

        <div class="upload-section">
            <h3>Deploy New Task</h3>
            <p class="subtitle">Upload a compiled .c file to distribute across the cluster</p>
            <form action="/submit" method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".c" required><br>
                <button type="submit">Execute Distributed Deploy</button>
            </form>
        </div>
    </div>

    <script>
        function getLoadColor(load) {
            if (load < 50) return 'var(--success)';
            if (load < 80) return 'var(--warning)';
            return 'var(--danger)';
        }

        function updateStatus() {
            fetch('/status')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('nodes');
                    const nodeCount = document.getElementById('node-count');
                    const avgLoadDisp = document.getElementById('avg-load');
                    
                    const ips = Object.keys(data);
                    nodeCount.innerText = ips.length;

                    if (ips.length === 0) {
                        container.innerHTML = '<div class="subtitle">No active nodes detected.</div>';
                        return;
                    }

                    let totalLoad = 0;
                    container.innerHTML = '';
                    
                    ips.forEach(ip => {
                        const load = data[ip].load;
                        totalLoad += load;
                        const color = getLoadColor(load);

                        container.innerHTML += `
                            <div class="node-card">
                                <div class="node-info">
                                    <div class="node-ip">${ip}</div>
                                    <div class="subtitle">Status: Online</div>
                                </div>
                                <div class="load-container">
                                    <div style="display:flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 2px;">
                                        <span>LOAD</span>
                                        <span style="color:${color}">${load}%</span>
                                    </div>
                                    <div class="load-bar">
                                        <div class="load-fill" style="width: ${load}%; background: ${color}"></div>
                                    </div>
                                </div>
                            </div>`;
                    });

                    avgLoadDisp.innerText = Math.round(totalLoad / ips.length) + '%';
                })
                .catch(err => console.error("Update failed:", err));
        }

        setInterval(updateStatus, 2000);
        updateStatus(); // Initial call
    </script>
</body>
</html>
